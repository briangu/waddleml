<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>waddle dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
<style>
  :root {
    --bg: #0b1020; --bg2: #0f1730; --bg3: #122040;
    --fg: #e6eef8; --muted: #8899bb; --accent: #65c3ff; --accent2: #a78bfa;
    --border: #1e3050; --success: #34d399; --danger: #f87171; --warn: #fbbf24;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--fg); font: 14px/1.5 system-ui, -apple-system, sans-serif; }
  a { color: var(--accent); text-decoration: none; }

  /* layout */
  .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
  header { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 16px; font-weight: 600; }
  .ws-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); }
  .ws-dot.connected { background: var(--success); }

  .content { display: grid; grid-template-columns: 360px 1fr; overflow: hidden; }
  .sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 10px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sidebar-header input { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--fg); padding: 6px 10px; font-size: 13px; }
  .sidebar-header input::placeholder { color: var(--muted); }
  .run-list { flex: 1; overflow-y: auto; padding: 6px; }

  .run-card { padding: 8px 10px; border-radius: var(--radius); margin: 4px 0; cursor: pointer; background: var(--bg2); border: 1px solid var(--border); transition: background 0.15s; }
  .run-card:hover { background: var(--bg3); }
  .run-card.active { border-color: var(--accent); }
  .run-card.selected { border-color: var(--accent2); background: #1a1040; }
  .run-card .name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .run-card .meta { font-size: 12px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }

  .status { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .status-running { background: #1a3a2a; color: var(--success); }
  .status-completed { background: #1a2a3a; color: var(--accent); }
  .status-failed { background: #3a1a1a; color: var(--danger); }
  .status-aborted { background: #3a2a1a; color: var(--warn); }

  .main { overflow-y: auto; padding: 16px; }
  .tabs { display: flex; gap: 2px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab { padding: 8px 16px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; font-size: 13px; }
  .tab:hover { color: var(--fg); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .panel { display: none; }
  .panel.active { display: block; }

  /* tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* cards */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .card h3 { font-size: 13px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* buttons */
  .btn { background: var(--bg2); color: var(--fg); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; font-size: 13px; }
  .btn:hover { background: var(--bg3); }
  .btn-accent { background: #1a3050; border-color: var(--accent); color: var(--accent); }
  .btn-danger { border-color: var(--danger); color: var(--danger); }
  .btn-sm { padding: 3px 8px; font-size: 12px; }

  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }

  .chart-container { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; margin-bottom: 12px; }
  .empty { color: var(--muted); text-align: center; padding: 40px; }
  .kv-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 16px; font-size: 13px; }
  .kv-grid dt { color: var(--muted); }
  .kv-grid dd { word-break: break-all; }

  select { background: var(--bg2); color: var(--fg); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 8px; font-size: 13px; }
  .checkbox-label { display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
<header>
  <h1>waddle</h1>
  <div class="ws-dot" id="wsDot" title="WebSocket status"></div>
  <span style="color:var(--muted);font-size:12px" id="wsStatus">disconnected</span>
  <div style="flex:1"></div>
  <button class="btn btn-sm" onclick="loadRuns()">Refresh</button>
  <button class="btn btn-sm btn-accent" id="compareBtn" style="display:none" onclick="showCompare()">Compare Selected</button>
</header>
<div class="content">
  <div class="sidebar">
    <div class="sidebar-header">
      <input type="text" id="searchInput" placeholder="Search runs..." oninput="filterRuns()"/>
    </div>
    <div class="run-list" id="runList"></div>
  </div>
  <div class="main" id="mainContent">
    <div class="empty" id="placeholder">Select a run from the sidebar, or select multiple for comparison.</div>

    <!-- Single run view -->
    <div id="runView" style="display:none">
      <div class="toolbar">
        <h2 id="runTitle" style="font-size:16px;flex:1"></h2>
        <button class="btn btn-sm btn-danger" onclick="deleteCurrentRun()">Delete</button>
      </div>
      <div class="tabs" id="runTabs">
        <div class="tab active" data-tab="overview">Overview</div>
        <div class="tab" data-tab="metrics">Metrics</div>
        <div class="tab" data-tab="system">System</div>
        <div class="tab" data-tab="artifacts">Artifacts</div>
      </div>

      <div class="panel active" id="panel-overview">
        <div id="overviewChart" style="display:none">
          <div class="card">
            <h3>Metrics Overview</h3>
            <div class="toolbar">
              <label>Metric: <select id="overviewMetricSelect" onchange="loadOverviewChart()"></select></label>
            </div>
            <div class="chart-container"><div id="overviewBarChart" style="height:360px"></div></div>
          </div>
        </div>
        <div class="card"><h3>Run Info</h3><dl class="kv-grid" id="runInfo"></dl></div>
        <div class="card"><h3>Parameters</h3><dl class="kv-grid" id="runParams"></dl></div>
        <div class="card"><h3>Tags</h3><dl class="kv-grid" id="runTags"></dl></div>
        <div class="card"><h3>Environment</h3><dl class="kv-grid" id="runEnv"></dl></div>
      </div>

      <div class="panel" id="panel-metrics">
        <div class="toolbar">
          <label>Metric: <select id="metricSelect" onchange="plotMetric()"></select></label>
        </div>
        <div class="chart-container"><div id="metricChart" style="height:360px"></div></div>
        <div class="card"><h3>All Metrics</h3><div id="allMetricsCharts"></div></div>
      </div>

      <div class="panel" id="panel-system">
        <div id="sysCharts"></div>
        <p class="empty" id="noSysMetrics" style="display:none">No system metrics recorded for this run.</p>
      </div>

      <div class="panel" id="panel-artifacts">
        <table>
          <thead><tr><th>Name</th><th>Kind</th><th>Size</th><th>SHA256</th></tr></thead>
          <tbody id="artifactTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Comparison view -->
    <div id="compareView" style="display:none">
      <div class="toolbar">
        <h2 style="font-size:16px;flex:1">Run Comparison</h2>
        <button class="btn btn-sm" onclick="hideCompare()">Back</button>
      </div>
      <div class="card"><h3>Parameter Diff</h3><div id="paramDiff"></div></div>
      <div id="compareCharts"></div>
    </div>
  </div>
</div>
</div>

<script>
const API = location.origin;
let allRuns = [];
let currentRun = null;
let selectedIds = new Set();
let runDetail = null;
let allMetrics = [];
let ws = null;

// ---- Data loading ----
async function loadRuns() {
  try {
    const res = await fetch(`${API}/api/runs`);
    allRuns = await res.json();
  } catch(e) { allRuns = []; }
  renderRunList();
  loadOverviewMetricKeys();
}

function renderRunList() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const list = document.getElementById('runList');
  list.innerHTML = '';
  const filtered = allRuns.filter(r => {
    const text = `${r.name||''} ${r.project||''} ${r.entry||''} ${r.status||''}`.toLowerCase();
    return text.includes(search);
  });
  filtered.forEach(r => {
    const div = document.createElement('div');
    const isActive = currentRun && currentRun.id === r.id;
    const isSelected = selectedIds.has(r.id);
    div.className = 'run-card' + (isActive ? ' active' : '') + (isSelected ? ' selected' : '');
    const start = r.started_at ? new Date(r.started_at * 1000).toLocaleString() : '';
    const statusCls = 'status status-' + (r.status || 'running');
    div.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px">
        <input type="checkbox" ${isSelected?'checked':''} onclick="event.stopPropagation();toggleSelect('${r.id}')"/>
        <span class="name">${r.name || r.id.slice(0,8)}</span>
        <span class="${statusCls}">${r.status}</span>
      </div>
      <div class="meta">
        <span>${r.project||'default'}</span>
        <span>${start}</span>
        <span>${(r.commit_sha||'').slice(0,7)}</span>
      </div>`;
    div.onclick = (e) => { if(e.target.type!=='checkbox') selectRun(r); };
    list.appendChild(div);
  });
}

function filterRuns() { renderRunList(); }

function toggleSelect(id) {
  if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
  document.getElementById('compareBtn').style.display = selectedIds.size >= 2 ? '' : 'none';
  renderRunList();
}

async function selectRun(r) {
  currentRun = r;
  renderRunList();
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('compareView').style.display = 'none';
  document.getElementById('runView').style.display = '';

  // load detail
  try {
    const res = await fetch(`${API}/api/runs/${r.id}`);
    runDetail = await res.json();
  } catch(e) { runDetail = {run:{},params:{},tags:{},artifacts:[],metric_keys:[]}; }

  // load metrics
  try {
    const res = await fetch(`${API}/api/runs/${r.id}/metrics`);
    allMetrics = await res.json();
  } catch(e) { allMetrics = []; }

  renderDetail();
}

function renderDetail() {
  if(!runDetail) return;
  const run = runDetail.run || {};
  document.getElementById('runTitle').textContent = run.name || run.id?.slice(0,8) || '';

  // overview
  const info = document.getElementById('runInfo');
  info.innerHTML = kvRows({
    ID: run.id, Project: run.project, Status: run.status, Entry: run.entry,
    Commit: (run.commit_sha||'').slice(0,10),
    Started: run.started_at ? new Date(run.started_at*1000).toLocaleString() : '',
    Ended: run.ended_at ? new Date(run.ended_at*1000).toLocaleString() : '',
    Duration: run.started_at && run.ended_at ? ((run.ended_at-run.started_at).toFixed(1)+'s') : (run.started_at ? 'running...' : ''),
    Notes: run.notes || '',
  });

  const params = runDetail.params || {};
  document.getElementById('runParams').innerHTML = kvRows(params);

  const tags = runDetail.tags || {};
  document.getElementById('runTags').innerHTML = kvRows(tags);

  const env = run.env || {};
  document.getElementById('runEnv').innerHTML = kvRows(typeof env === 'object' ? env : {});

  // metric selector
  const mkeys = (runDetail.metric_keys || []).filter(k => !k.startsWith('system/'));
  const sel = document.getElementById('metricSelect');
  sel.innerHTML = '';
  mkeys.forEach(k => { const o = document.createElement('option'); o.value=k; o.textContent=k; sel.appendChild(o); });
  plotMetric();
  plotAllMetrics(mkeys);

  // system metrics
  const sysKeys = (runDetail.metric_keys || []).filter(k => k.startsWith('system/'));
  plotSystemMetrics(sysKeys);

  // artifacts
  const arts = runDetail.artifacts || [];
  const tbody = document.getElementById('artifactTable');
  tbody.innerHTML = '';
  arts.forEach(a => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${a.name}</td><td>${a.kind}</td><td>${a.size_bytes != null ? formatBytes(a.size_bytes) : '-'}</td><td style="font-family:monospace;font-size:11px">${(a.sha256||'').slice(0,16)}...</td>`;
    tbody.appendChild(tr);
  });

  // activate first tab
  switchTab('overview');
}

function plotMetric() {
  const key = document.getElementById('metricSelect').value;
  if(!key) { Plotly.purge('metricChart'); return; }
  const data = allMetrics.filter(m => m.key === key).sort((a,b) => a.step - b.step);
  Plotly.newPlot('metricChart', [{
    x: data.map(d => d.step), y: data.map(d => d.value),
    type: 'scatter', mode: 'lines+markers', line: {color: '#65c3ff', width: 2}, marker: {size: 4},
  }], chartLayout(key, 'Step', 'Value'), {responsive: true, displayModeBar: false});
}

function plotAllMetrics(keys) {
  const container = document.getElementById('allMetricsCharts');
  container.innerHTML = '';
  keys.forEach(key => {
    const data = allMetrics.filter(m => m.key === key).sort((a,b) => a.step - b.step);
    if(!data.length) return;
    const div = document.createElement('div');
    div.className = 'chart-container';
    const chart = document.createElement('div');
    chart.style.height = '200px';
    div.appendChild(chart);
    container.appendChild(div);
    Plotly.newPlot(chart, [{
      x: data.map(d => d.step), y: data.map(d => d.value),
      type: 'scatter', mode: 'lines', line: {color: '#65c3ff', width: 1.5},
    }], chartLayout(key, 'Step', '', true), {responsive: true, displayModeBar: false});
  });
}

function plotSystemMetrics(keys) {
  const container = document.getElementById('sysCharts');
  container.innerHTML = '';
  const noSys = document.getElementById('noSysMetrics');
  if(!keys.length) { noSys.style.display = ''; return; }
  noSys.style.display = 'none';
  const colors = ['#65c3ff','#a78bfa','#34d399','#fbbf24','#f87171','#fb923c'];
  keys.forEach((key, i) => {
    const data = allMetrics.filter(m => m.key === key).sort((a,b) => a.step - b.step);
    if(!data.length) return;
    const div = document.createElement('div');
    div.className = 'chart-container';
    const chart = document.createElement('div');
    chart.style.height = '200px';
    div.appendChild(chart);
    container.appendChild(div);
    Plotly.newPlot(chart, [{
      x: data.map(d => d.step), y: data.map(d => d.value),
      type: 'scatter', mode: 'lines', line: {color: colors[i % colors.length], width: 1.5},
      fill: 'tozeroy', fillcolor: colors[i % colors.length] + '15',
    }], chartLayout(key, 'Sample', '', true), {responsive: true, displayModeBar: false});
  });
}

// ---- Comparison ----
async function showCompare() {
  const ids = [...selectedIds];
  if(ids.length < 2) return;
  document.getElementById('runView').style.display = 'none';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('compareView').style.display = '';

  let data;
  try {
    const res = await fetch(`${API}/api/compare`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({run_ids: ids}),
    });
    data = await res.json();
  } catch(e) { return; }

  // param diff table
  const allKeys = new Set();
  const params = data.params || {};
  Object.values(params).forEach(p => Object.keys(p).forEach(k => allKeys.add(k)));
  const runs = data.runs || [];
  let html = '<table><thead><tr><th>Param</th>';
  runs.forEach(r => html += `<th>${r.name||r.id.slice(0,8)}</th>`);
  html += '</tr></thead><tbody>';
  [...allKeys].sort().forEach(k => {
    html += `<tr><td>${k}</td>`;
    runs.forEach(r => {
      const v = (params[r.id]||{})[k];
      html += `<td>${v !== undefined ? JSON.stringify(v) : '-'}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('paramDiff').innerHTML = html;

  // metric overlay charts
  const charts = document.getElementById('compareCharts');
  charts.innerHTML = '';
  const metrics = data.metrics || {};
  const colors = ['#65c3ff','#a78bfa','#34d399','#fbbf24','#f87171','#fb923c'];
  Object.keys(metrics).sort().forEach(key => {
    if(key.startsWith('system/')) return;
    const series = metrics[key];
    const div = document.createElement('div');
    div.className = 'chart-container';
    const chart = document.createElement('div');
    chart.style.height = '280px';
    div.appendChild(chart);
    charts.appendChild(div);
    const traces = runs.map((r, i) => {
      const pts = series.filter(s => s.run_id === r.id).sort((a,b) => a.step - b.step);
      return {
        x: pts.map(p => p.step), y: pts.map(p => p.value),
        type: 'scatter', mode: 'lines', name: r.name || r.id.slice(0,8),
        line: {color: colors[i % colors.length], width: 2},
      };
    });
    Plotly.newPlot(chart, traces, chartLayout(key, 'Step', 'Value'), {responsive: true, displayModeBar: false});
  });
}

function hideCompare() {
  document.getElementById('compareView').style.display = 'none';
  if(currentRun) { document.getElementById('runView').style.display = ''; }
  else { showOverview(); }
}

// ---- Actions ----
async function deleteCurrentRun() {
  if(!currentRun || !confirm(`Delete run ${currentRun.name||currentRun.id.slice(0,8)}?`)) return;
  try { await fetch(`${API}/api/runs/${currentRun.id}`, {method:'DELETE'}); } catch(e) {}
  currentRun = null; runDetail = null;
  document.getElementById('runView').style.display = 'none';
  showOverview();
  loadRuns();
}

// ---- Tabs ----
document.getElementById('runTabs').addEventListener('click', e => {
  if(e.target.classList.contains('tab')) switchTab(e.target.dataset.tab);
});
function switchTab(name) {
  document.querySelectorAll('#runTabs .tab').forEach(t => t.classList.toggle('active', t.dataset.tab===name));
  document.querySelectorAll('#runView .panel').forEach(p => p.classList.toggle('active', p.id==='panel-'+name));
}

// ---- WebSocket ----
function connectWS() {
  try {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.onopen = () => { document.getElementById('wsDot').classList.add('connected'); document.getElementById('wsStatus').textContent='connected'; };
    ws.onclose = () => { document.getElementById('wsDot').classList.remove('connected'); document.getElementById('wsStatus').textContent='disconnected'; setTimeout(connectWS, 3000); };
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if(msg.type==='metric' && currentRun && msg.run_id===currentRun.id) {
          allMetrics.push({key:msg.key, step:msg.step, ts:msg.ts, value:msg.value});
          const sel = document.getElementById('metricSelect');
          if(sel.value === msg.key) plotMetric();
        }
        if(msg.type==='status') loadRuns();
      } catch(_){}
    };
  } catch(e) {}
}

// ---- Helpers ----
function kvRows(obj) {
  let html = '';
  for(const [k,v] of Object.entries(obj)) {
    const val = typeof v === 'object' ? JSON.stringify(v) : String(v);
    html += `<dt>${k}</dt><dd>${val}</dd>`;
  }
  return html;
}

function formatBytes(b) {
  if(b==null) return '-';
  if(b < 1024) return b+'B';
  if(b < 1048576) return (b/1024).toFixed(1)+'KB';
  return (b/1048576).toFixed(1)+'MB';
}

function chartLayout(title, xaxis, yaxis, small) {
  return {
    title: {text: title, font: {size: small?12:14, color:'#8899bb'}},
    paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
    font: {color: '#8899bb', size: 11},
    xaxis: {title: xaxis, gridcolor: '#1e3050', zerolinecolor: '#1e3050'},
    yaxis: {title: yaxis, gridcolor: '#1e3050', zerolinecolor: '#1e3050'},
    margin: small ? {t:30,b:30,l:50,r:20} : {t:40,b:40,l:60,r:20},
    showlegend: !small,
    legend: {bgcolor:'transparent', font:{color:'#8899bb'}},
  };
}

// ---- Overview Chart ----
function showOverview() {
  document.getElementById('placeholder').style.display = '';
}

async function loadOverviewMetricKeys() {
  try {
    const res = await fetch(`${API}/api/metric-keys`);
    const keys = await res.json();
    const sel = document.getElementById('overviewMetricSelect');
    sel.innerHTML = '';
    if (!keys.length) {
      document.getElementById('overviewChart').style.display = 'none';
      return;
    }
    keys.forEach(k => { const o = document.createElement('option'); o.value = k; o.textContent = k; sel.appendChild(o); });
    document.getElementById('overviewChart').style.display = '';
    loadOverviewChart();
  } catch(e) {
    document.getElementById('overviewChart').style.display = 'none';
  }
}

async function loadOverviewChart() {
  const key = document.getElementById('overviewMetricSelect').value;
  if (!key) { Plotly.purge('overviewBarChart'); return; }
  try {
    const res = await fetch(`${API}/api/metric-summary?key=${encodeURIComponent(key)}&limit=20`);
    const data = await res.json();
    if (!data.length) { Plotly.purge('overviewBarChart'); return; }
    const labels = data.map(d => d.name || d.run_id.slice(0, 8));
    const values = data.map(d => d.value);
    Plotly.newPlot('overviewBarChart', [{
      x: labels, y: values, type: 'bar',
      marker: { color: '#65c3ff' },
    }], chartLayout(key + ' (final value per run)', 'Run', 'Value'), {responsive: true, displayModeBar: false});
  } catch(e) { Plotly.purge('overviewBarChart'); }
}

// ---- Init ----
loadRuns();
connectWS();
</script>
</body>
</html>
